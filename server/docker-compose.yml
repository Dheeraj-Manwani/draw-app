services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: excalidraw
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: excalidraw
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U excalidraw"]
      interval: 5s
      retries: 5

volumes:
  pgdata:
